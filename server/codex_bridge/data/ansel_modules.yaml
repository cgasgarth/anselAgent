version: 1
modules:
  - id: rawprepare
    display_name: Raw Prepare
    category: input
    stage: input_prep
    purpose: Prepare RAW sensor data before demosaic by normalizing black and white points.
    when_to_use:
      - Editing RAW captures.
      - A RAW file looks technically misinterpreted or clipped.
    avoid_when:
      - The source is not a RAW file.
      - The automatic camera defaults already look correct.
    primary_controls:
      - raw black and white point handling: sensor normalization and clipping anchors
    agent_guidance: Leave it automatic unless the RAW decode is visibly wrong.
    common_user_phrases:
      - fix the raw decode
      - something is wrong with the raw baseline
    prerequisites:
      - demosaic
    conflicts_or_overlaps:
      - basicadj
    output_type: technical
    confidence_notes: RAW-only technical foundation.
  - id: soften
    display_name: Soften
    category: effect
    stage: local_edit
    purpose: Add a soft-focus glow and reduce microcontrast for a dreamy rendering.
    when_to_use:
      - The user wants a dreamy portrait look.
      - Harsh detail should be intentionally softened.
    avoid_when:
      - The user wants crisp realism.
      - Another glow effect like bloom already provides the look.
    primary_controls:
      - softness: amount of diffusion and glow
    agent_guidance: Keep the effect subtle and avoid stacking with bloom unless the look is explicitly stylized.
    common_user_phrases:
      - make it dreamy
      - soften the portrait
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - bloom
      - blurs
    output_type: creative
    confidence_notes: Easy to overdo on detailed subjects.
  - id: bloom
    display_name: Bloom
    category: effect
    stage: local_edit
    purpose: Add glow around bright regions for an ethereal or high-key effect.
    when_to_use:
      - The user wants glow around highlights.
      - A stylized dreamy finish is requested.
    avoid_when:
      - Highlights already lack definition.
      - The user wants a clean, realistic render.
    primary_controls:
      - bloom strength: size and intensity of highlight glow
    agent_guidance: Use late in the workflow and keep it restrained unless the brief is overtly stylized.
    common_user_phrases:
      - add glow
      - make the highlights bloom
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - soften
      - diffuse
    output_type: creative
    confidence_notes: Can quickly wash out highlight structure.
  - id: highpass
    display_name: Highpass
    category: tone
    stage: local_edit
    purpose: Extract high-frequency detail for edge emphasis and frequency-separation workflows.
    when_to_use:
      - Fine edge detail needs emphasis.
      - A frequency-separation style workflow is intended.
    avoid_when:
      - Noise is already prominent.
      - Diffuse or sharpen already handles the detail goal.
    primary_controls:
      - radius: size of extracted high-frequency detail
    agent_guidance: Prefer diffuse or a modest sharpen pass first; use this only for specific detail workflows.
    common_user_phrases:
      - bring out edges
      - emphasize fine detail
    prerequisites:
      - denoiseprofile
    conflicts_or_overlaps:
      - sharpen
      - diffuse
    output_type: technical
    confidence_notes: Amplifies noise easily.
  - id: lowpass
    display_name: Lowpass
    category: effect
    stage: local_edit
    purpose: Blur low-frequency structure for smoothing, glow, or separation-style effects.
    when_to_use:
      - Broad smoothing is desired.
      - A stylized separation workflow needs a blurred base.
    avoid_when:
      - Detail retention is important.
      - The goal is corrective denoise rather than an effect.
    primary_controls:
      - blur radius: extent of low-frequency smoothing
    agent_guidance: Treat it as a niche effect or workflow utility, not a first-line correction tool.
    common_user_phrases:
      - smooth the tones
      - blur the broad shapes
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - blurs
      - bilateral
    output_type: creative
    confidence_notes: Can flatten images quickly.
  - id: shadhi
    display_name: Shadows And Highlights
    category: tone
    stage: tone_mapping
    purpose: Adjust shadows and highlights using the older legacy approach.
    when_to_use:
      - Older edit compatibility is needed.
      - The user explicitly wants the legacy module behavior.
    avoid_when:
      - Tone equalizer can solve the problem more cleanly.
      - A natural result matters more than matching an old workflow.
    primary_controls:
      - shadow and highlight amounts: tonal lift and compression
    agent_guidance: Prefer toneequal in modern workflows and use this sparingly to avoid halos.
    common_user_phrases:
      - open the shadows
      - tame the highlights
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - toneequal
      - filmicrgb
    output_type: corrective
    confidence_notes: Legacy module prone to halo artifacts.
  - id: colorreconstruct
    display_name: Color Reconstruction
    category: color
    stage: scene_linear
    purpose: Rebuild highlight color where structure remains but chroma has washed out.
    when_to_use:
      - Bright highlights have lost color but still show detail.
      - Highlight areas look grey or colorless after clipping.
    avoid_when:
      - Raw clipped-channel recovery is the real issue.
      - Highlights are not actually damaged.
    primary_controls:
      - reconstruction method: how lost color is inferred
    agent_guidance: Use after technical highlight handling when only color repair is still needed.
    common_user_phrases:
      - bring color back to the highlights
      - the bright areas look washed out
    prerequisites:
      - highlights
    conflicts_or_overlaps:
      - highlights
    output_type: corrective
    confidence_notes: Best for highlight chroma repair, not full tone recovery.
  - id: tonemap
    display_name: Tone Mapping
    category: tone
    stage: tone_mapping
    purpose: Apply an older or alternative HDR-style tone-mapping look.
    when_to_use:
      - A stylized HDR rendering is requested.
      - The user wants a legacy tone-mapped look.
    avoid_when:
      - Natural scene-referred rendering is the goal.
      - Filmic RGB already provides the global mapping.
    primary_controls:
      - compression strength: how aggressively dynamic range is flattened
    agent_guidance: Use only on explicit HDR-style intent and avoid combining with other strong tone mappers.
    common_user_phrases:
      - make it hdr
      - give it a dramatic mapped look
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - filmicrgb
      - basecurve
      - globaltonemap
    output_type: creative
    confidence_notes: Often looks synthetic if pushed.
  - id: tonecurve
    display_name: Tone Curve
    category: tone
    stage: tone_mapping
    purpose: Shape global luminance with a legacy tone curve.
    when_to_use:
      - The user explicitly wants curve-based global contrast.
      - A legacy workflow or old edit needs reproduction.
    avoid_when:
      - Filmic RGB and tone equalizer already define the tone strategy.
      - Base curve is also being used aggressively.
    primary_controls:
      - curve points: tonal redistribution across the range
    agent_guidance: Use one primary curve strategy only and keep it out of modern filmic-first flows unless requested.
    common_user_phrases:
      - add an s-curve
      - use a classic tone curve
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - basecurve
      - rgbcurve
      - levels
      - filmicrgb
    output_type: corrective
    confidence_notes: Legacy overlap-heavy tone control.
  - id: colisa
    display_name: Brightness Contrast Saturation
    category: tone
    stage: tone_mapping
    purpose: Provide a quick legacy brightness, contrast, and saturation adjustment.
    when_to_use:
      - Reproducing an older quick-adjust workflow.
      - The user wants a rough all-in-one tweak.
    avoid_when:
      - Dedicated exposure and color tools are available.
      - Precise control is needed.
    primary_controls:
      - brightness contrast saturation: rough global utility adjustments
    agent_guidance: Low-priority convenience tool; prefer more specific modules in modern edits.
    common_user_phrases:
      - quick contrast boost
      - rough global tweak
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - exposure
      - colorbalancergb
      - vibrance
    output_type: corrective
    confidence_notes: Legacy convenience module.
  - id: gamma
    display_name: Gamma
    category: output
    stage: output_prep
    purpose: Apply a technical gamma adjustment for special display or output cases.
    when_to_use:
      - A special gamma conversion workflow is required.
      - An output/display mismatch needs technical correction.
    avoid_when:
      - Normal scene-referred editing is in progress.
      - The user just wants brighter or darker tones.
    primary_controls:
      - gamma: nonlinear output brightness response
    agent_guidance: Do not treat this as a creative brightness control.
    common_user_phrases:
      - adjust gamma
      - match display gamma
    prerequisites:
      - colorout
    conflicts_or_overlaps:
      - profile_gamma
      - exposure
    output_type: technical
    confidence_notes: Technical utility, rarely the right aesthetic tool.
  - id: temperature
    display_name: White Balance
    category: input
    stage: input_prep
    purpose: Neutralize or shift the capture illuminant through white-balance controls.
    when_to_use:
      - The user wants the image warmer or cooler.
      - A color cast needs technical neutralization.
    avoid_when:
      - The cast is intentional and belongs to creative grading.
      - Fine palette shaping is better handled downstream.
    primary_controls:
      - temperature and tint: neutralization of illuminant color
    agent_guidance: Use this first for technical white balance on RAW files before broader color grading.
    common_user_phrases:
      - make it warmer
      - fix the white balance
    prerequisites:
      - rawprepare
    conflicts_or_overlaps:
      - colorbalancergb
      - colorcorrection
    output_type: corrective
    confidence_notes: Best treated as technical color correction, not mood grading.
  - id: colorcorrection
    display_name: Color Correction
    category: color
    stage: color_grading
    purpose: Apply broad legacy color correction shifts.
    when_to_use:
      - Reproducing an older edit.
      - A rough legacy correction is specifically desired.
    avoid_when:
      - White balance is the real issue.
      - Modern targeted color tools are available.
    primary_controls:
      - hue and saturation shifts: broad color correction
    agent_guidance: Prefer temperature, color balance RGB, or color zones when they solve the problem more directly.
    common_user_phrases:
      - old-school color correction
      - shift the overall color tone
    prerequisites:
      - colorin
    conflicts_or_overlaps:
      - temperature
      - colorbalancergb
      - colorzones
    output_type: corrective
    confidence_notes: Legacy broad color tool.
  - id: basicadj
    display_name: Basic Adjustments
    category: tone
    stage: tone_mapping
    purpose: Apply a quick bundled set of basic tone and saturation controls.
    when_to_use:
      - A simple fast adjustment is enough.
      - The user wants camera-JPEG-like rough tuning.
    avoid_when:
      - A modern scene-referred workflow is being built carefully.
      - More precise modules are already in use.
    primary_controls:
      - basic exposure contrast saturation: bundled utility controls
    agent_guidance: Use only for quick broad adjustments; prefer dedicated modules for deliberate edits.
    common_user_phrases:
      - basic cleanup
      - quick overall adjustment
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - exposure
      - basecurve
      - colisa
    output_type: corrective
    confidence_notes: Utility-style module with lots of overlap.
  - id: exposure
    display_name: Exposure
    category: tone
    stage: scene_linear
    purpose: Apply global exposure compensation and anchor midtone placement before downstream tone mapping.
    when_to_use:
      - The image needs to be brighter or darker overall.
      - Underexposure or overexposure needs global correction.
    avoid_when:
      - The user only wants local relighting.
      - Another issue like white balance or clipping is the true problem.
    primary_controls:
      - exposure compensation: global EV shift and black-level anchoring
    agent_guidance: First global tone control in most modern workflows; keep it conservative before filmicrgb.
    common_user_phrases:
      - make it brighter
      - lower the exposure
    prerequisites:
      - temperature
    conflicts_or_overlaps:
      - levels
      - rgblevels
      - basicadj
    output_type: corrective
    confidence_notes: Core foundational tone adjustment.
  - id: equalizer
    display_name: Contrast Equalizer
    category: tone
    stage: local_edit
    purpose: Adjust detail and local contrast by scale in a wavelet-style workflow.
    when_to_use:
      - Older multiscale detail shaping is desired.
      - The user wants local contrast or deblur in a legacy workflow.
    avoid_when:
      - Diffuse or more modern detail tools can solve it.
      - Simple sharpening is sufficient.
    primary_controls:
      - scale bands: detail and contrast changes across frequencies
    agent_guidance: Powerful but overlap-heavy; prefer diffuse for modern advanced detail control.
    common_user_phrases:
      - enhance local contrast
      - sharpen by detail scales
    prerequisites:
      - denoiseprofile
    conflicts_or_overlaps:
      - diffuse
      - atrous
      - sharpen
    output_type: corrective
    confidence_notes: Legacy multiscale tool with a steeper tuning curve.
  - id: rgbcurve
    display_name: RGB Curve
    category: tone
    stage: color_grading
    purpose: Shape contrast and color bias through per-channel RGB curves.
    when_to_use:
      - Precise curve-based contrast or channel shaping is needed.
      - The user explicitly asks for RGB curve control.
    avoid_when:
      - Simpler tone or color tools solve the request.
      - Multiple other endpoint or curve tools are already active.
    primary_controls:
      - per-channel curves: tonal and color shaping
    agent_guidance: Use only with clear intent and avoid stacking with other strong curve modules.
    common_user_phrases:
      - shape the rgb curve
      - tweak the red and blue curves
    prerequisites:
      - colorin
    conflicts_or_overlaps:
      - tonecurve
      - levels
      - colorbalancergb
    output_type: creative
    confidence_notes: Very flexible and easy to overcomplicate.
  - id: colorbalance
    display_name: Color Balance
    category: color
    stage: color_grading
    purpose: Apply the older color-balance workflow for shadows, midtones, and highlights.
    when_to_use:
      - An older history stack needs compatibility.
      - The user explicitly wants the legacy color balance module.
    avoid_when:
      - Color balance RGB is available.
      - White balance is the real issue.
    primary_controls:
      - tonal range color balance: broad warm and cool grading
    agent_guidance: Prefer colorbalancergb in modern workflows.
    common_user_phrases:
      - warm the shadows and cool the highs
      - old color balance look
    prerequisites:
      - colorin
    conflicts_or_overlaps:
      - colorbalancergb
      - splittoningrgb
    output_type: creative
    confidence_notes: Legacy grading fallback.
  - id: colorin
    display_name: Input Color Profile
    category: input
    stage: input_prep
    purpose: Convert the source image into the working color space using the input profile.
    when_to_use:
      - Interpreting RAW or device color correctly.
      - Debugging profile or color pipeline issues.
    avoid_when:
      - The user is asking for creative color changes.
      - The default input profile is already correct.
    primary_controls:
      - input profile: source color interpretation
    agent_guidance: Treat as technical foundation and usually leave automatic.
    common_user_phrases:
      - use the right camera profile
      - fix the input profile
    prerequisites:
      - demosaic
    conflicts_or_overlaps:
      - colorout
    output_type: technical
    confidence_notes: Usually automatic and foundational.
  - id: colorout
    display_name: Output Color Profile
    category: output
    stage: output_prep
    purpose: Convert the working image into the final display or export output profile.
    when_to_use:
      - Preparing for a specific display or export target.
      - Screen versus print output needs control.
    avoid_when:
      - Mid-edit creative grading is still underway.
      - The user is asking for stylistic color changes.
    primary_controls:
      - output profile and rendering intent: final output conversion
    agent_guidance: Keep this near the end of the workflow and default to standard output spaces unless the target is known.
    common_user_phrases:
      - export for srgb
      - prepare for print color
    prerequisites:
      - filmicrgb
    conflicts_or_overlaps:
      - gamma
      - profile_gamma
    output_type: technical
    confidence_notes: Final output-stage technical module.
  - id: colorchecker
    display_name: Color Checker
    category: color
    stage: input_prep
    purpose: Match or calibrate colors using a known reference chart.
    when_to_use:
      - A color chart is present.
      - Product or reproduction work needs repeatable color.
    avoid_when:
      - No reference target is available.
      - The user wants purely creative grading.
    primary_controls:
      - chart matching: chart-based calibration transforms
    agent_guidance: Use only when a physical reference exists in the image.
    common_user_phrases:
      - calibrate from the color checker
      - match the chart
    prerequisites:
      - colorin
    conflicts_or_overlaps:
      - colorbalance
      - colorbalancergb
    output_type: technical
    confidence_notes: Reference-driven calibration tool.
  - id: clipping
    display_name: Clipping
    category: diagnostic
    stage: diagnostic
    purpose: Show clipping or image-boundary diagnostics and utility framing controls.
    when_to_use:
      - Checking clipping warnings.
      - Technical framing or boundary handling matters.
    avoid_when:
      - The user wants an aesthetic fix rather than analysis.
      - Tone mapping is the actual solution.
    primary_controls:
      - clipping display: warning overlay and boundary handling
    agent_guidance: Treat as support or diagnostic, not a creative correction.
    common_user_phrases:
      - show clipping
      - check blown areas
    prerequisites: []
    conflicts_or_overlaps:
      - overexposed
      - rawoverexposed
    output_type: diagnostic
    confidence_notes: Diagnostic and utility module rather than an edit.
  - id: crop
    display_name: Crop
    category: geometry
    stage: local_edit
    purpose: Reframe composition and aspect ratio by cropping the image.
    when_to_use:
      - The composition needs reframing.
      - A target aspect ratio is required.
    avoid_when:
      - Perspective correction should happen first.
      - The runtime intentionally hides crop controls from the agent.
    primary_controls:
      - frame bounds: composition and aspect ratio
    agent_guidance: Conceptually use after geometry correction, but do not plan on it when crop controls are unavailable to the agent.
    common_user_phrases:
      - crop tighter
      - change the aspect ratio
    prerequisites:
      - ashift
      - rotatepixels
    conflicts_or_overlaps:
      - clipping
    output_type: corrective
    confidence_notes: Useful conceptually, but current agent runtime may not expose crop edits.
  - id: sharpen
    display_name: Sharpen
    category: tone
    stage: local_edit
    purpose: Add basic edge crispness with a simple sharpening pass.
    when_to_use:
      - The image is mildly soft.
      - A basic output sharpen is sufficient.
    avoid_when:
      - Noise is visible.
      - Diffuse or other detail modules already shape detail strongly.
    primary_controls:
      - amount and radius: edge crispness
    agent_guidance: Keep subtle and avoid stacking with aggressive diffuse or highpass work.
    common_user_phrases:
      - sharpen it a bit
      - make it crisper
    prerequisites:
      - denoiseprofile
    conflicts_or_overlaps:
      - diffuse
      - highpass
      - equalizer
    output_type: corrective
    confidence_notes: Simple fallback sharpening tool.
  - id: dither
    display_name: Dither
    category: output
    stage: output_prep
    purpose: Add dithering to reduce visible banding during output quantization.
    when_to_use:
      - Smooth gradients risk banding on export.
      - Vignettes or graduated edits create posterization.
    avoid_when:
      - The image stays in a high-bit-depth internal workflow.
      - No visible banding risk exists.
    primary_controls:
      - dithering: noise-shaped anti-banding for export
    agent_guidance: Save this for the output stage and enable only when banding is a plausible risk.
    common_user_phrases:
      - prevent banding
      - fix posterization in the gradient
    prerequisites:
      - finalscale
      - colorout
    conflicts_or_overlaps:
      - grain
    output_type: technical
    confidence_notes: Output-only technical safeguard.
  - id: monochrome
    display_name: Monochrome
    category: color
    stage: color_grading
    purpose: Convert the image to monochrome with simple color-filter style control.
    when_to_use:
      - The user wants a black-and-white conversion.
      - A straightforward monochrome look is enough.
    avoid_when:
      - Channel Mixer RGB offers a better monochrome route.
      - The user wants to keep the image in color.
    primary_controls:
      - filter response: tonal separation in black and white
    agent_guidance: Use for simple monochrome conversion; prefer channelmixerrgb for more advanced B&W control.
    common_user_phrases:
      - make it black and white
      - convert to monochrome
    prerequisites:
      - colorin
    conflicts_or_overlaps:
      - channelmixerrgb
    output_type: creative
    confidence_notes: Simple monochrome path.
  - id: basecurve
    display_name: Base Curve
    category: tone
    stage: tone_mapping
    purpose: Apply a legacy display-oriented curve similar to camera JPEG rendering.
    when_to_use:
      - A punchy camera-like look is requested quickly.
      - Backward compatibility with an old edit is required.
    avoid_when:
      - A modern filmic RGB workflow is being used.
      - Another strong global tone-mapping strategy is already active.
    primary_controls:
      - curve preset and shape: camera-JPEG-like tone response
    agent_guidance: Legacy path only; avoid pairing with filmic-style modules.
    common_user_phrases:
      - make it look like the camera jpeg
      - quick punchy base look
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - filmicrgb
      - filmic
      - tonecurve
    output_type: corrective
    confidence_notes: Legacy module that conflicts with modern scene-referred mapping.
  - id: colorzones
    display_name: Color Zones
    category: color
    stage: color_grading
    purpose: Adjust lightness, saturation, or hue selectively by color range.
    when_to_use:
      - A specific color family needs targeted adjustment.
      - The user asks for selective color changes like sky or foliage only.
    avoid_when:
      - Broad grading is enough.
      - White balance is the actual issue.
    primary_controls:
      - hue-zone curves: selective hue, saturation, and lightness changes
    agent_guidance: Good targeted color tool when the request names a specific color range.
    common_user_phrases:
      - make the greens less yellow
      - deepen only the blue sky
    prerequisites:
      - colorin
    conflicts_or_overlaps:
      - colorequal
      - colorbalancergb
    output_type: corrective
    confidence_notes: Strong selective color tool.
  - id: highlights
    display_name: Highlights
    category: tone
    stage: scene_linear
    purpose: Reconstruct or tame clipped highlights before later tone mapping.
    when_to_use:
      - Bright areas have lost detail.
      - The sky or speculars show channel clipping.
    avoid_when:
      - Highlights are not clipped.
      - The real issue is global tone placement.
    primary_controls:
      - reconstruction mode and strength: clipped highlight recovery
    agent_guidance: Use early and pair with exposure rather than as a substitute for full tone mapping.
    common_user_phrases:
      - recover highlights
      - bring back detail in the sky
    prerequisites:
      - exposure
    conflicts_or_overlaps:
      - colorreconstruct
      - filmicrgb
    output_type: corrective
    confidence_notes: Early corrective highlight tool.
  - id: rawoverexposed
    display_name: Raw Overexposed
    category: diagnostic
    stage: diagnostic
    purpose: Display RAW-domain overexposure warnings for clipped sensor channels.
    when_to_use:
      - Sensor clipping needs diagnosis.
      - RAW highlight risk must be inspected.
    avoid_when:
      - The user wants an actual correction.
      - Processed-image clipping, not RAW clipping, is the concern.
    primary_controls:
      - raw clipping overlay: sensor-channel clipping display
    agent_guidance: Diagnostic only; use it to inspect, not to fix.
    common_user_phrases:
      - show raw clipping
      - check sensor overexposure
    prerequisites: []
    conflicts_or_overlaps:
      - overexposed
      - clipping
    output_type: diagnostic
    confidence_notes: RAW-only diagnostic overlay.
  - id: velvia
    display_name: Velvia
    category: effect
    stage: color_grading
    purpose: Add a vivid film-like saturation and punch effect.
    when_to_use:
      - The user wants intense, punchy color.
      - A stylized slide-film look is desired.
    avoid_when:
      - Natural color is important.
      - Other saturation boosts are already active.
    primary_controls:
      - velvia amount: saturation and color-pop intensity
    agent_guidance: Treat it as a creative effect and watch for oversaturation, especially in skin and foliage.
    common_user_phrases:
      - make the colors pop
      - give it a vivid film look
    prerequisites:
      - colorin
    conflicts_or_overlaps:
      - vibrance
      - colorbalance
    output_type: creative
    confidence_notes: Easy to make colors look artificial.
  - id: vignette
    display_name: Vignette
    category: effect
    stage: output_prep
    purpose: Darken or lighten edges to direct attention inward.
    when_to_use:
      - The subject needs subtle emphasis.
      - The user wants a vintage or framed look.
    avoid_when:
      - Lens correction already removed unwanted natural vignette and realism is preferred.
      - The edges carry important detail that should stay even.
    primary_controls:
      - falloff and strength: edge brightness shaping
    agent_guidance: Use as a finishing touch and keep it subtle unless the look is explicitly stylized.
    common_user_phrases:
      - add a vignette
      - darken the edges
    prerequisites:
      - lens
    conflicts_or_overlaps:
      - graduatednd
      - borders
    output_type: creative
    confidence_notes: Can look dated or obvious if overused.
  - id: splittoning
    display_name: Split Toning
    category: effect
    stage: color_grading
    purpose: Apply legacy split toning to different tonal ranges.
    when_to_use:
      - An older stylized warm-cool tonal split is wanted.
      - Matching an older split-toning workflow.
    avoid_when:
      - Modern RGB split toning or color balance RGB is available.
      - The user wants neutral correction.
    primary_controls:
      - shadow and highlight tones: stylized tonal color separation
